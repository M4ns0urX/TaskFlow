<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gerenciador de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --accent:   #e8ff47;
      --danger:   #ff4757;
      --text:     #f0f0f0;
      --muted:    #666;
      --alta:     #ff6b35;
      --media:    #e8ff47;
      --baixa:    #3ddc84;
      --pendente: #888;
      --andamento:#e8ff47;
      --concluida:#3ddc84;
      --radius:   4px;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }
    .logo span { color: var(--accent); }
    .header-stats {
      display: flex;
      gap: 1.5rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .header-stats b { color: var(--accent); }

    /* ── MAIN LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── SECTION TITLE ── */
    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
    }
    .form-title {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
      padding-left: 0.75rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    select option { background: var(--surface); }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--accent); color: #0d0d0d; font-weight: 700; }
    .btn-cancel   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-danger   { background: var(--danger); color: #fff; }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── TASK GRID ── */
    #taskList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
      transition: border-color 0.2s;
    }
    .task-card:hover { border-color: #444; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }
    .task-title {
      font-weight: 800;
      font-size: 0.95rem;
      line-height: 1.3;
      flex: 1;
    }
    .task-title.concluida { text-decoration: line-through; opacity: 0.5; }

    .badge {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.55rem;
      border-radius: 2px;
      white-space: nowrap;
    }
    .badge-alta    { background: rgba(255,107,53,0.15); color: var(--alta); }
    .badge-media   { background: rgba(232,255,71,0.12); color: var(--media); }
    .badge-baixa   { background: rgba(61,220,132,0.12); color: var(--baixa); }

    .task-desc {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }

    .task-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.pendente::before   { background: var(--pendente); }
    .status-dot.em-andamento::before { background: var(--andamento); }
    .status-dot.concluida::before  { background: var(--concluida); }
    .status-dot.pendente   { color: var(--pendente); }
    .status-dot.em-andamento { color: var(--andamento); }
    .status-dot.concluida  { color: var(--concluida); }

    .task-actions {
      display: flex;
      gap: 0.4rem;
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }
    .icon-btn:hover        { border-color: var(--accent); color: var(--accent); }
    .icon-btn.del:hover    { border-color: var(--danger); color: var(--danger); }

    /* ── DATE ── */
    .task-date {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty p { font-family: var(--mono); font-size: 0.8rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── LOADING ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">TASK<span>FLOW</span></div>
  <div class="header-stats">
    <span>TOTAL <b id="statTotal">0</b></span>
    <span>PENDENTES <b id="statPend">0</b></span>
    <span>CONCLUÍDAS <b id="statDone">0</b></span>
  </div>
</header>

<div class="container">

  <!-- FORM -->
  <div class="form-card">
    <div class="form-title" id="formTitle">➕ Nova Tarefa</div>
    <input type="hidden" id="editId" />
    <div class="form-grid">
      <div class="full">
        <label>Título *</label>
        <input type="text" id="titulo" placeholder="Descreva o que precisa ser feito..." />
      </div>
      <div class="full">
        <label>Descrição</label>
        <textarea id="descricao" rows="2" placeholder="Detalhes adicionais (opcional)"></textarea>
      </div>
      <div>
        <label>Prioridade</label>
        <select id="prioridade">
          <option value="baixa">🟢 Baixa</option>
          <option value="media" selected>🟡 Média</option>
          <option value="alta">🔴 Alta</option>
        </select>
      </div>
      <div id="statusField" style="display:none">
        <label>Status</label>
        <select id="status">
          <option value="pendente">Pendente</option>
          <option value="em-andamento">Em Andamento</option>
          <option value="concluida">Concluída</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveTask()">
        <span id="btnTxt">SALVAR TAREFA</span>
      </button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none">CANCELAR</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-label">Tarefas</div>

  <div class="filters">
    <button class="filter-btn active" data-filter="todas" onclick="setFilter(this)">Todas</button>
    <button class="filter-btn" data-filter="pendente"     onclick="setFilter(this)">Pendentes</button>
    <button class="filter-btn" data-filter="em-andamento" onclick="setFilter(this)">Em Andamento</button>
    <button class="filter-btn" data-filter="concluida"    onclick="setFilter(this)">Concluídas</button>
  </div>

  <div id="taskList"></div>
</div>

<div id="toast"></div>

<script>
  const API = '/api/tarefas';
  let allTasks = [];
  let currentFilter = 'todas';

  // ── FETCH ALL ──
  async function loadTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
    try {
      const res = await fetch(API);
      const json = await res.json();
      allTasks = json.data || [];
      renderTasks();
      updateStats();
    } catch (e) {
      showToast('Erro ao conectar com o servidor', true);
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Erro ao carregar tarefas</p></div>';
    }
  }

  // ── RENDER ──
  function renderTasks() {
    const list = document.getElementById('taskList');
    const filtered = currentFilter === 'todas'
      ? allTasks
      : allTasks.filter(t => t.status === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">📋</div>
        <p>Nenhuma tarefa encontrada</p>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const date = new Date(t.criado_em).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
      return `
        <div class="task-card" id="card-${t.id}">
          <div class="task-top">
            <div class="task-title ${t.status === 'concluida' ? 'concluida' : ''}">${escHtml(t.titulo)}</div>
            <span class="badge badge-${t.prioridade}">${t.prioridade}</span>
          </div>
          <div class="task-desc">${t.descricao ? escHtml(t.descricao) : '—'}</div>
          <div class="task-meta">
            <span class="status-dot ${t.status}">${t.status.replace('-',' ')}</span>
            <div class="task-actions">
              <button class="icon-btn" onclick="editTask(${t.id})" title="Editar">✏️</button>
              <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Deletar">🗑️</button>
            </div>
          </div>
          <div class="task-date">Criado em ${date}</div>
        </div>`;
    }).join('');
  }

  // ── STATS ──
  function updateStats() {
    document.getElementById('statTotal').textContent = allTasks.length;
    document.getElementById('statPend').textContent  = allTasks.filter(t => t.status === 'pendente').length;
    document.getElementById('statDone').textContent  = allTasks.filter(t => t.status === 'concluida').length;
  }

  // ── FILTER ──
  function setFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTasks();
  }

  // ── SAVE (CREATE or UPDATE) ──
  async function saveTask() {
    const id     = document.getElementById('editId').value;
    const titulo = document.getElementById('titulo').value.trim();
    if (!titulo) { showToast('Título é obrigatório', true); return; }

    const body = {
      titulo,
      descricao:  document.getElementById('descricao').value.trim(),
      prioridade: document.getElementById('prioridade').value,
    };
    if (id) body.status = document.getElementById('status').value;

    const method = id ? 'PUT' : 'POST';
    const url    = id ? `${API}/${id}` : API;

    try {
      const res  = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      showToast(json.message);
      cancelEdit();
      loadTasks();
    } catch (e) {
      showToast(e.message || 'Erro ao salvar', true);
    }
  }

  // ── EDIT ──
  function editTask(id) {
    const t = allTasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('editId').value        = t.id;
    document.getElementById('titulo').value        = t.titulo;
    document.getElementById('descricao').value     = t.descricao || '';
    document.getElementById('prioridade').value    = t.prioridade;
    document.getElementById('status').value        = t.status;
    document.getElementById('statusField').style.display = '';
    document.getElementById('cancelBtn').style.display  = '';
    document.getElementById('formTitle').textContent     = '✏️ Editar Tarefa';
    document.getElementById('btnTxt').textContent        = 'ATUALIZAR';
    document.getElementById('titulo').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── CANCEL EDIT ──
  function cancelEdit() {
    document.getElementById('editId').value = '';
    document.getElementById('titulo').value = '';
    document.getElementById('descricao').value = '';
    document.getElementById('prioridade').value = 'media';
    document.getElementById('statusField').style.display = 'none';
    document.getElementById('cancelBtn').style.display  = 'none';
    document.getElementById('formTitle').textContent    = '➕ Nova Tarefa';
    document.getElementById('btnTxt').textContent       = 'SALVAR TAREFA';
  }

  // ── DELETE ──
  async function deleteTask(id) {
    if (!confirm('Deletar esta tarefa? Esta ação não pode ser desfeita.')) return;
    try {
      const res  = await fetch(`${API}/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      showToast(json.message);
      loadTasks();
    } catch (e) {
      showToast(e.message || 'Erro ao deletar', true);
    }
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // ── UTILS ──
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ──
  loadTasks();
</script>
</body>
</html>
